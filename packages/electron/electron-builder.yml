appId: com.ccr.desktop
productName: ccr
copyright: Copyright © 2026 ryan

# What gets bundled into the installer.
# `dist/` is produced by `electron-vite build`.
files:
  - out/**
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.md"
  - "!**/CHANGELOG*"
  - "!**/README*"
  - "!**/LICENSE*"
  - "!**/.bin/**"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/*.test.*"

# Strip ~50 locales from Electron — we only ship English UI.
# Saves ~5-10 MB.
electronLanguages:
  - en
  - en-US

# Maximum compression: ~20-25% smaller installers in exchange for slower
# builds. Worth it for a download page where every megabyte is friction.
compression: maximum

# Strip dev metadata that bloats package.json without runtime use.
removePackageScripts: true
removePackageKeywords: true

directories:
  output: dist-installers
  buildResources: build

# Auto-update channel — left empty for now; once a release server is in
# place this can publish to GitHub Releases automatically.
# publish:
#   provider: github
#   owner: ryanssareen
#   repo: ccr

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Code signing left to environment variables (CSC_LINK / CSC_KEY_PASSWORD)
  # Until then, the unsigned DMG triggers the Gatekeeper "damaged" warning,
  # which the /download page documents.
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  artifactName: ccr-${version}-mac-${arch}.dmg
  # ULFO = LZFSE compression (Apple's native), smaller + faster than UDZO.
  # Requires macOS 10.11+, which is far below our 11+ floor.
  format: ULFO
  # Avoid bundling background images / icons we don't need.
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Windows code signing also defers to env vars (CSC_LINK / CSC_KEY_PASSWORD).
  # Without it, SmartScreen will warn on first run; identical UX to the
  # unsigned mac DMG.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ccr-setup-${version}-win-${arch}.exe
  # NSIS uses LZMA at maximum compression by default; the global
  # `compression: maximum` already opts us into that.

portable:
  artifactName: ccr-portable-${version}-win-${arch}.exe

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development

appImage:
  artifactName: ccr-${version}-linux-${arch}.AppImage
