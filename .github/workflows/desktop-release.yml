name: Desktop release

# Triggers a build on every tag matching desktop-vX.Y.Z and uploads
# the resulting installers to a GitHub Release.
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14    # Apple-Silicon runner — produces both arm64 and x64 DMGs
            target: mac
          - os: windows-2022
            target: win
          - os: ubuntu-22.04
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root + workspace deps
        run: npm ci

      - name: Build core + desktop
        run: |
          npm run -w @ccr/core build
          npm run -w @ccr/desktop build

      - name: Build installers
        working-directory: packages/electron
        env:
          # When you have a code-signing cert, drop the base64-encoded p12
          # into CSC_LINK (data: URL or path) and the password into
          # CSC_KEY_PASSWORD. Without these, builds are unsigned.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ccr-desktop-${{ matrix.target }}
          path: |
            packages/electron/dist-installers/*.dmg
            packages/electron/dist-installers/*.exe
            packages/electron/dist-installers/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
